stages:
  - build
  - test
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  BACKEND_IMAGE: $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_REF_NAME
  FRONTEND_IMAGE: $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_REF_NAME

# ========================================
# BUILD STAGE
# ========================================

build-backend:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "Building backend image..."
    - docker build -t $BACKEND_IMAGE ./backend
    - echo "Pushing backend image to registry..."
    - docker push $BACKEND_IMAGE
  only:
    - main

build-frontend:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "Building frontend image..."
    - docker build -t $FRONTEND_IMAGE ./frontend
    - echo "Pushing frontend image to registry..."
    - docker push $FRONTEND_IMAGE
  only:
    - main

# ========================================
# TEST STAGE
# ========================================

test-frontend:
  stage: test
  image: node:20-slim
  script:
    - echo "Validating frontend environment..."
    - node -v
  only:
    - main

# ========================================
# DEPLOY STAGE
# ========================================

deploy-backend:
  stage: deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USER@$SSH_HOST "
        cd /home/finance/backend/main &&
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        docker-compose pull app &&
        docker-compose up -d --no-deps app
      "
  only:
    - main
  dependencies:
    - build-backend

deploy-frontend:
  stage: deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USER@$SSH_HOST "
        cd /home/finance/frontend/main &&
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        docker-compose pull app &&
        docker stop finance-frontend-main || true &&
        docker rm finance-frontend-main || true &&
        docker-compose up -d --no-deps app
      "
  only:
    - main
  dependencies:
    - build-frontend
