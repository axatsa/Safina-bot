include:
  - project: base/ci-cd
    file: frontend.yml
    ref: main

variables:
  PROJECT_DISPLAY_NAME: Thompson Finance React Frontend
  DEPLOY_BASE_PATH: frontend/frontend

docker-build:
  extends: .docker_build_template

deploy:
  extends: .deploy_template

restart:
  stage: .post
  image: alpine:latest
  only:
    - main
  needs:
    - deploy
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "StrictHostKeyChecking no" >> ~/.ssh/config
  script:
    - |
      ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "CI_REGISTRY_USER=$CI_REGISTRY_USER CI_REGISTRY_PASSWORD=$CI_REGISTRY_PASSWORD CI_REGISTRY=$CI_REGISTRY bash -s" << 'ENDSSH'
        set -e
        cd ~/frontend/main

        echo "Logging in to GitLab Registry..."
        echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin

        echo "Pulling new image..."
        docker compose pull app

        echo "Restarting only frontend container..."
        docker stop finance-frontend-main || true
        docker rm finance-frontend-main || true
        docker compose up -d app

        echo "Done! Frontend status:"
        docker ps | grep finance-frontend
      ENDSSH

success:
  extends: .notify_success_template

failure:
  extends: .notify_failure_template

