# DO NOT EDIT - SYSTEM FIXED VERSION
# This file is optimized for the server's specific Docker and GitLab Runner configuration.
# Any change to 'image', 'tags', or 'ssh scripts' may cause 404 errors or stuck pipelines.

stages:
  - 🔨 build
  - 🧪 test
  - 🚀 deploy

variables:
  FRONTEND_IMAGE: $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_REF_NAME
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

# ========================================
# BUILD STAGE
# ========================================
build-frontend:
  stage: 🔨 build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "Building frontend image..."
    - docker build -t $FRONTEND_IMAGE .
    - echo "Pushing frontend image to registry..."
    - docker push $FRONTEND_IMAGE
  only:
    - main

# ========================================
# TEST STAGE
# ========================================
test-frontend:
  stage: 🧪 test
  image: node:20-slim
  script:
    - echo "Validating frontend environment..."
    - node -v
  only:
    - main

# ========================================
# DEPLOY STAGE
# ========================================
deploy-frontend:
  stage: 🚀 deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USER@$SSH_HOST "
        cd /home/finance/frontend/main &&
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        echo 'Pulling...' &&
        docker-compose pull app &&
        echo 'Restarting specific container with --no-deps to bypass server bug...' &&
        docker stop finance-frontend-main || true &&
        docker rm finance-frontend-main || true &&
        docker-compose up -d --no-deps app
      "
  only:
    - main
  dependencies:
    - build-frontend
